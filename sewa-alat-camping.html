<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Tiket I'AMpel GADING Homeland</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sewa.css">
    <link rel="stylesheet" href="css/cart.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-booking">
            <img src="images/Logoo.png" alt="Logo" class="logo-img">
            <div class="navbar-nav">
                <a href="index.html">Beranda</a>
                <a href="katalog.html">Booking</a>
                <a href="Panduan.html">Panduan Booking</a>
            </div>
            <div class="navbar-extra">
                <a href="#" class="navbar-icon" data-cart id="cart-btn">
                    <i data-feather="shopping-cart"></i>
                </a>
                <div id="cart-popup" class="cart-popup">
                    <div id="cart-content"></div>
                </div>
            </div>
        </nav>

        <div class="camping-hero">
            <img src="images/camping.jpg" alt="Camping Image" class="camping-hero-img">
            <div class="camping-hero-overlay">
                <div class="header-center">
                    <h1>Sewa Alat Camping</h1>
                    <nav class="breadcrumb">
                        <a href="index.html">Beranda</a>
                        <span>&gt;</span>
                        <a href="katalog.html">Booking</a>
                        <span>&gt;</span>
                        <a href="sewa-alat-camping.html">Sewa Alat Camping</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="keterangan">
            <h1 style="font-size: 24px; text-align: center; margin-bottom: 20px; justify-content: center">Pilih Alat
                Camping yang Anda Butuhkan</h1>
            <p style="text-align: center; margin-bottom: 30px;">Semua alat berkualitas dan terawat dengan baik</p>
        </div>

        <!-- Container untuk daftar alat camping -->
        <div class="camping-items-container">
            <!-- Item akan diisi oleh JavaScript -->
        </div>

        <div class="cart-summary">
            <button id="add-all-to-cart" class="btn-cart-summary">Tambahkan ke Keranjang</button>
        </div>
    </main>
    <script src="src/navbar-scroll.js"></script>
    <script src="src/cart.js"></script>
    <script src="src/camping-handler.js"></script>
    <script>
        feather.replace();

        fetch('php/api/get-alat-camping.php')
            .then(res => res.json())
            .then(data => {
                if (data.success) renderCampingItems(data.data);
            });

        function renderCampingItems(items) {
            const container = document.querySelector('.camping-items-container');
            container.innerHTML = items.map(item => `
      <div class="camping-item">
        <img src="${item.gambar_url}" alt="${item.nama_alat}">
        <h3>${item.nama_alat}</h3>
        <p class="price">Rp ${item.harga.toLocaleString()}/${item.satuan}</p>
        <div class="quantity-control">
          <button class="btn-qty minus" data-item="${item.id}">-</button>
          <span class="qty-display" data-item="${item.id}">0</span>
          <button class="btn-qty plus" data-item="${item.id}">+</button>
        </div>
      </div>
    `).join('');
            // lanjutkan dengan event handler qty & add to cart
        }
    </script>
</body>

</html>
